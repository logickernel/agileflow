name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set version number
        run: sed -i "s/AGILEFLOW_VERSION=.*/AGILEFLOW_VERSION=${GITHUB_REF_NAME}/" agileflow
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: agileflow
