agileflow:
  stage: deploy
  script:
    - ./agileflow tag --key ${AGILEFLOW_KEY} --debug
  only:
    - /^release\/[0-9]+\.[0-9]+$/
  tags:
    - agileflow

deploy:
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - sed -i "s/AGILEFLOW_VERSION=.*/AGILEFLOW_VERSION=${CI_COMMIT_TAG}/" agileflow
  only:
    - tags
    - /^v[0-9]+\.[0-9]+\.[0-9]+$/
  artifacts:
    name: "agileflow_${CI_COMMIT_TAG}"
    paths:
      - agileflow
    when: on_success
    expire_in: "30 days"
  release: # See https://docs.gitlab.com/ee/ci/yaml/#release for available properties
    tag_name: "$CI_COMMIT_TAG"
    description: "$CI_COMMIT_TAG"
