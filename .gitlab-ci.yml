# .gitlab-ci.yml
agileflow:
  image: registry.logickernel.com/kernel/agileflow:0.6.4
  only:
    - /^release\/[0-9]+\.[0-9]+$/
  script:
    - agileflow gitlab-ci
  tags:
    - agileflow

release:
  stage: deploy
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    # Build and push linux/amd64 image
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME}"
      --customPlatform "linux/amd64"
      --build-arg TARGETOS=linux
      --build-arg TARGETARCH=amd64
    # Build and push linux/arm64 image
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME}-arm64"
      --customPlatform "linux/arm64"
      --build-arg TARGETOS=linux
      --build-arg TARGETARCH=arm64
  only:
    - tags

manifest:
  stage: deploy
  needs: ["release"]
  image: cgr.dev/chainguard/crane:latest
  script:
    - crane auth login "${CI_REGISTRY}" -u "${CI_REGISTRY_USER}" -p "${CI_REGISTRY_PASSWORD}"
    - crane manifest create "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME}" "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME}" "${CI_REGISTRY_IMAGE}:${CI_COMMIT_REF_NAME}-arm64"
  only:
    - tags