stages:
  - tagging

agileflow:
  stage: tagging
  script:
    - chmod +x ./agileflow # Make sure the script has execution permissions
    - chmod 600 ${AGILEFLOW_KEY}
    - ./agileflow --key ${AGILEFLOW_KEY}
  only:
    - /^release\/[0-9]+\.[0-9]+$/ # Adjust this pattern if needed
    - /^r\/[0-9]+\.[0-9]+$/ # Adjust this pattern if needed
