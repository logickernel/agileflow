# .gitlab-ci.yml
agileflow:
  image: registry.logickernel.com/kernel/agileflow:v0.6.10
  only:
    - /^release\/[0-9]+\.[0-9]+$/
  script:
    - agileflow gitlab-ci
  tags:
    - agileflow

release:
  stage: deploy
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - VERSION="${CI_COMMIT_TAG#v}"   # strips leading "v"
    - >-
      /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:${VERSION}"
      --customPlatform "linux/amd64"
      --build-arg TARGETOS=linux
      --build-arg TARGETARCH=amd64
  only:
    - tags