build:
  stage: build
  script:
    - sed -i "s/VERSION=.*/VERSION=${CI_COMMIT_TAG}/" agileflow
  only:
    - tags
    - /^v[0-9]+\.[0-9]+\.[0-9]+$/
  artifacts:
    name: "agileflow${CI_COMMIT_TAG}"
    paths:
      - agileflow
    when: on_success
    expire_in: "30 days"

agileflow:
  stage: deploy
  script:
    - ./agileflow tag --key ${AGILEFLOW_KEY} --debug
  only:
    - /^release\/[0-9]+\.[0-9]+$/
  tags:
    - agileflow
