agileflow:
  stage: .pre
  image: registry.logickernel.com/kernel/agileflow:0.6.42
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - agileflow gitlab-ci
  artifacts:
    reports:
      dotenv: version.env

agileflow-tag:
  stage: .pre
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TAG && $CI_PIPELINE_SOURCE != "pipeline"'
  variables:
    VERSION: ${CI_COMMIT_TAG#v}
  script:
    - echo "VERSION=$VERSION" >> version.env
  artifacts:
    reports:
      dotenv: version.env