agileflow:
  image: registry.logickernel.com/kernel/agileflow:0.6.27
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-[a-zA-Z0-9.-]+)?$/'
    - when: never
  script:
    - echo "VERSION=$(agileflow gitlab-ci)" > version.env
  artifacts:
    reports: { dotenv: version.env }